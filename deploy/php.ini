; PHP 配置 for SaBlog-X
; 放置到 /usr/local/etc/php/php.ini (Docker) 或对应 PHP 配置目录

; 文件上传
upload_max_filesize = 10M
post_max_size = 10M
max_file_uploads = 20

; 内存和执行时间
memory_limit = 128M
max_execution_time = 300
max_input_time = 300

; 错误显示（生产环境建议关闭）
display_errors = Off
log_errors = On
error_log = /var/log/php/error.log

; 时区
date.timezone = Asia/Shanghai

; 会话
session.gc_maxlifetime = 14400
session.cookie_httponly = 1

; 安全
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; 扩展（根据实际需要启用）
extension=mysqli
extension=pdo_mysql
extension=gd
extension=mbstring

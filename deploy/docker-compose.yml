version: '3.8'

services:
  sablog:
    image: php:7.4-fpm-alpine
    container_name: sablog-php
    restart: unless-stopped
    working_dir: /var/www/sablog
    volumes:
      - ./:/var/www/sablog:rw
      - ./deploy/php.ini:/usr/local/etc/php/php.ini:ro
    networks:
      - sablog-network

  nginx:
    image: nginx:alpine
    container_name: sablog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/sablog:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - sablog
    networks:
      - sablog-network

  db:
    image: mysql:5.7
    container_name: sablog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: your_root_password
      MYSQL_DATABASE: sablog
      MYSQL_USER: sablog
      MYSQL_PASSWORD: your_sablog_password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - sablog-network

volumes:
  db_data:

networks:
  sablog-network:
    driver: bridge
